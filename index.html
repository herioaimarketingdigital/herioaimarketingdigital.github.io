<title>HERIO AI – Marketing Digital · Ibiza</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #FAFAF8;
    --ivory: #F5F0EA;
    --sand: #E8DDD0;
    --pearl: #EDE8E1;
    --rose: #C9A4A0;
    --rose-light: #E8C5C0;
    --rose-deep: #B08880;
    --blue: #2B4A6B;
    --blue-mid: #3D6A94;
    --blue-light: #7AA3C4;
    --blue-sky: #A8C8E0;
    --teal: #4A8FA8;
    --gold: #C4A875;
    --gold-light: #D4BC95;
    --charcoal: #2C2C2C;
    --dark: #1A1A1A;
    --glass: rgba(250,250,248,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--white);
    color: var(--charcoal);
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--ivory); }
  ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 2px; }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 0 60px;
    height: 80px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(43,74,107,0.1);
    transition: all 0.4s ease;
  }
  nav.scrolled {
    height: 65px;
    background: rgba(250,250,248,0.97);
    box-shadow: 0 4px 40px rgba(43,74,107,0.08);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--blue);
    text-decoration: none;
  }
  .nav-logo span { color: var(--rose-deep); font-style: italic; }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--charcoal); text-decoration: none; font-weight: 400;
    position: relative; padding-bottom: 4px;
    transition: color 0.3s;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 0; height: 1px; background: var(--rose-deep);
    transition: width 0.3s ease;
  }
  .nav-links a:hover { color: var(--blue); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    background: var(--blue); color: var(--white) !important;
    padding: 10px 24px !important; border-radius: 2px;
    transition: background 0.3s !important;
  }
  .nav-cta:hover { background: var(--blue-mid) !important; color: var(--white) !important; }
  .nav-cta::after { display: none !important; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1100; }
  .hamburger span { display: block; width: 24px; height: 1.5px; background: var(--charcoal); transition: all 0.3s; }

  /* ─── HERO ─── */
  #hero {
    height: 100vh; min-height: 700px;
    position: relative; display: flex; align-items: center;
    overflow: hidden;
  }

  .hero-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(250,250,248,0.95) 100%);
  }
  /* Floating orbs */
  .orb {
    position: absolute; border-radius: 50%;
    animation: floatOrb 8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb1 { width: 400px; height: 400px; top: -100px; right: -100px; background: radial-gradient(circle, rgba(74,143,168,0.25), transparent 70%); animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; bottom: 100px; left: -80px; background: radial-gradient(circle, rgba(201,164,160,0.3), transparent 70%); animation-delay: 3s; }
  .orb3 { width: 200px; height: 200px; top: 30%; right: 20%; background: radial-gradient(circle, rgba(196,168,117,0.2), transparent 70%); animation-delay: 5s; }
  @keyframes floatOrb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }

  .hero-content {
    position: relative; z-index: 2;
    max-width: 1200px; margin: 0 auto; padding: 0 60px;
    padding-top: 80px;
  }
  .hero-eyebrow {
    font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--gold-light); font-weight: 400; margin-bottom: 24px;
    opacity: 0; animation: fadeUp 1s ease 0.3s forwards;
    display: flex; align-items: center; gap: 16px;
  }
  .hero-eyebrow::before { content: ''; width: 40px; height: 1px; background: var(--gold-light); }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(56px, 7vw, 96px);
    font-weight: 300; line-height: 1.0;
    color: var(--white);
    opacity: 0; animation: fadeUp 1s ease 0.5s forwards;
  }
  .hero-title em { font-style: italic; color: #FFB5B0; text-shadow: 0 0 30px rgba(255,100,80,0.9), 0 2px 10px rgba(0,0,0,0.8); }
  .hero-title .blue-accent { color: var(--blue-sky); }
  .hero-sub {
    font-size: 16px; font-weight: 200; color: rgba(250,250,248,0.85);
    max-width: 520px; line-height: 1.8; margin-top: 28px;
    opacity: 0; animation: fadeUp 1s ease 0.7s forwards;
    letter-spacing: 0.02em;
  }
  .hero-buttons {
    display: flex; gap: 16px; margin-top: 48px; flex-wrap: wrap;
    opacity: 0; animation: fadeUp 1s ease 0.9s forwards;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--white); color: var(--blue);
    padding: 16px 36px; border-radius: 2px;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: 'Jost', sans-serif; font-weight: 500;
    text-decoration: none; border: none; cursor: pointer;
    transition: all 0.3s ease; white-space: nowrap;
  }
  .btn-primary:hover { background: var(--ivory); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent; color: var(--white);
    padding: 15px 36px; border-radius: 2px;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: 'Jost', sans-serif; font-weight: 400;
    text-decoration: none; border: 1px solid rgba(250,250,248,0.5); cursor: pointer;
    transition: all 0.3s ease; white-space: nowrap;
  }
  .btn-secondary:hover { border-color: var(--white); background: rgba(250,250,248,0.1); transform: translateY(-2px); }
  .hero-stats {
    display: flex; gap: 60px; margin-top: 80px;
    opacity: 0; animation: fadeUp 1s ease 1.1s forwards;
  }
  .stat { border-left: 1px solid rgba(250,250,248,0.3); padding-left: 24px; }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 300; color: var(--white); line-height: 1;
  }
  .stat-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(250,250,248,0.6); margin-top: 6px; }
  .scroll-indicator {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; animation: fadeIn 1s ease 1.5s forwards;
  }
  .scroll-indicator span { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(250,250,248,0.5); }
  .scroll-line { width: 1px; height: 60px; background: linear-gradient(to bottom, rgba(250,250,248,0.5), transparent); animation: scrollDown 2s ease-in-out infinite; }
  @keyframes scrollDown { 0%,100%{opacity:0.3;transform:scaleY(0.7)} 50%{opacity:1;transform:scaleY(1)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ─── SECTION BASE ─── */
  section { padding: 120px 60px; max-width: 1200px; margin: 0 auto; }
  .section-full { max-width: 100%; padding: 120px 0; }
  .section-label {
    font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--rose-deep); font-weight: 400; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before { content: ''; width: 30px; height: 1px; background: var(--rose-deep); }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(38px, 4.5vw, 60px);
    font-weight: 300; line-height: 1.15; color: var(--blue);
  }
  .section-title em { font-style: italic; color: var(--rose-deep); }

  /* ─── ABOUT ─── */
  #about { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center; }
  .about-img-wrap {
    position: relative;
  }
  .about-img-main {
    width: 100%; aspect-ratio: 3/4; object-fit: cover;
    border-radius: 4px;
  }
  .about-img-accent {
    position: absolute; bottom: -40px; right: -40px;
    width: 55%; aspect-ratio: 1; object-fit: cover;
    border-radius: 4px;
    border: 6px solid var(--white);
    box-shadow: 0 20px 60px rgba(43,74,107,0.15);
  }
  .about-badge {
    position: absolute; top: 30px; left: -20px;
    background: var(--blue); color: var(--white);
    padding: 20px 24px; border-radius: 2px;
    box-shadow: 0 10px 40px rgba(43,74,107,0.2);
  }
  .about-badge-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px; font-weight: 300; line-height: 1;
  }
  .about-badge-text { font-size: 10px; letter-spacing: 0.15em; opacity: 0.8; margin-top: 4px; }
  .about-text { padding-bottom: 40px; }
  .about-desc { font-size: 15px; font-weight: 300; line-height: 1.9; color: #555; margin-top: 32px; margin-bottom: 40px; }
  .about-features { list-style: none; display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; }
  .about-features li { display: flex; align-items: center; gap: 14px; font-size: 13px; font-weight: 300; color: var(--charcoal); }
  .about-features li::before { content: '✦'; color: var(--gold); font-size: 10px; }

  /* ─── SERVICES ─── */
  #services { background: var(--ivory); max-width: 100%; padding: 120px 60px; }
  .services-inner { max-width: 1200px; margin: 0 auto; }
  .services-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 72px; flex-wrap: wrap; gap: 32px; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .service-card {
    background: var(--white); padding: 52px 44px;
    position: relative; overflow: hidden;
    transition: all 0.4s ease; cursor: default;
    group: true;
  }
  .service-card::before {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--teal), var(--rose));
    transform: scaleX(0); transition: transform 0.4s ease;
    transform-origin: left;
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover { transform: translateY(-6px); box-shadow: 0 24px 60px rgba(43,74,107,0.1); z-index: 1; }
  .service-icon {
    font-size: 32px; margin-bottom: 28px; display: block;
    transition: transform 0.3s;
  }
  .service-card:hover .service-icon { transform: scale(1.15); }
  .service-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px; font-weight: 300; color: var(--sand);
    position: absolute; top: 20px; right: 30px; line-height: 1;
    transition: color 0.3s;
  }
  .service-card:hover .service-num { color: rgba(43,74,107,0.08); }
  .service-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 400; color: var(--blue);
    margin-bottom: 16px;
  }
  .service-desc { font-size: 13px; font-weight: 300; line-height: 1.8; color: #666; margin-bottom: 28px; }
  .service-link {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--rose-deep); text-decoration: none; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    transition: gap 0.3s;
  }
  .service-link:hover { gap: 14px; }

  /* ─── GALLERY ─── */
  #galeria { padding: 120px 0; background: var(--white); }
  .gallery-header { text-align: center; padding: 0 60px; margin-bottom: 64px; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 4px;
    padding: 0 4px;
  }
  .gallery-item { overflow: hidden; cursor: pointer; position: relative; }
  .gallery-item:nth-child(1) { grid-column: 1/6; grid-row: 1/3; }
  .gallery-item:nth-child(2) { grid-column: 6/9; grid-row: 1/2; }
  .gallery-item:nth-child(3) { grid-column: 9/13; grid-row: 1/2; }
  .gallery-item:nth-child(4) { grid-column: 6/9; grid-row: 2/3; }
  .gallery-item:nth-child(5) { grid-column: 9/13; grid-row: 2/3; }
  .gallery-item img {
    width: 100%; height: 100%; object-fit: cover;
    min-height: 200px;
    transition: transform 0.6s ease, filter 0.4s ease;
    filter: brightness(0.92) saturate(1.05);
  }
  .gallery-item:hover img { transform: scale(1.05); filter: brightness(1) saturate(1.15); }
  .gallery-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(43,74,107,0.7) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.4s;
    display: flex; align-items: flex-end; padding: 24px;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-overlay-text { color: var(--white); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; }

  /* ─── PROCESS ─── */
  #proceso {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 50%, var(--teal) 100%);
    padding: 120px 60px; max-width: 100%; position: relative; overflow: hidden;
  }
  #proceso::before {
    content: ''; position: absolute;
    width: 600px; height: 600px; border-radius: 50%;
    background: rgba(255,255,255,0.03);
    top: -200px; right: -100px;
  }
  .proceso-inner { max-width: 1200px; margin: 0 auto; }
  .proceso-inner .section-label { color: var(--blue-sky); }
  .proceso-inner .section-label::before { background: var(--blue-sky); }
  .proceso-inner .section-title { color: var(--white); }
  .proceso-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-top: 72px; }
  .step {
    background: rgba(255,255,255,0.06); padding: 44px 32px;
    border-top: 1px solid rgba(255,255,255,0.15);
    position: relative; transition: background 0.3s;
  }
  .step:hover { background: rgba(255,255,255,0.1); }
  .step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px; font-weight: 300;
    color: rgba(255,255,255,0.12); line-height: 1;
    margin-bottom: 20px;
  }
  .step-icon { font-size: 28px; margin-bottom: 16px; display: block; }
  .step-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; color: var(--white); font-weight: 400; margin-bottom: 12px;
  }
  .step-desc { font-size: 12px; font-weight: 200; color: rgba(255,255,255,0.65); line-height: 1.8; }
  .step-time { margin-top: 24px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light); }

  /* ─── REVIEWS ─── */
  #resenas { background: var(--pearl); max-width: 100%; padding: 120px 60px; }
  .resenas-inner { max-width: 1200px; margin: 0 auto; }
  .resenas-header { text-align: center; margin-bottom: 72px; }
  .resenas-header .section-label { justify-content: center; }
  .resenas-header .section-label::before { display: none; }
  .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .review-card {
    background: var(--white); padding: 44px 36px; border-radius: 2px;
    position: relative;
    box-shadow: 0 2px 20px rgba(43,74,107,0.05);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .review-card:hover { transform: translateY(-6px); box-shadow: 0 16px 50px rgba(43,74,107,0.1); }
  .review-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px; color: var(--sand);
    line-height: 0.5; margin-bottom: 24px; display: block;
  }
  .review-text { font-size: 14px; font-weight: 300; line-height: 1.85; color: #555; margin-bottom: 32px; font-style: italic; }
  .review-stars { color: var(--gold); font-size: 14px; letter-spacing: 3px; margin-bottom: 20px; }
  .reviewer { display: flex; align-items: center; gap: 14px; padding-top: 24px; border-top: 1px solid var(--sand); }
  .reviewer-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
  .reviewer-name { font-size: 13px; font-weight: 500; color: var(--blue); }
  .reviewer-role { font-size: 11px; font-weight: 300; color: #999; margin-top: 2px; }

  /* ─── PRICING ─── */
  #precios { padding: 120px 60px; }
